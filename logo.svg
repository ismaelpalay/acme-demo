<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" role="img" aria-label="MARCA ACME Fight & Fitness">
  <defs>
    <clipPath id="oct">
      <polygon points="155,18 345,18 482,155 482,345 345,482 155,482 18,345 18,155"/>
    </clipPath>
    <radialGradient id="bgG" cx="50%" cy="40%" r="72%">
      <stop offset="0%"   stop-color="#3a0008"/>
      <stop offset="35%"  stop-color="#1a0004"/>
      <stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="glowG" cx="50%" cy="46%" r="52%">
      <stop offset="0%"   stop-color="#E5001A" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#E5001A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5A3E00"/>
      <stop offset="18%"  stop-color="#D4A820"/>
      <stop offset="38%"  stop-color="#F8E060"/>
      <stop offset="58%"  stop-color="#C8980C"/>
      <stop offset="78%"  stop-color="#F0D040"/>
      <stop offset="100%" stop-color="#6A4A00"/>
    </linearGradient>
    <linearGradient id="goldInner" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7A5800"/>
      <stop offset="30%"  stop-color="#E8C830"/>
      <stop offset="65%"  stop-color="#B88010"/>
      <stop offset="100%" stop-color="#503800"/>
    </linearGradient>
    <linearGradient id="chromeG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="35%"  stop-color="#E0E0E0"/>
      <stop offset="65%"  stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#606060"/>
    </linearGradient>
    <linearGradient id="redM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FF5060"/>
      <stop offset="22%"  stop-color="#E5001A"/>
      <stop offset="60%"  stop-color="#A2000E"/>
      <stop offset="100%" stop-color="#600008"/>
    </linearGradient>
    <linearGradient id="goldTG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5E060"/>
      <stop offset="40%"  stop-color="#C89A18"/>
      <stop offset="100%" stop-color="#805A00"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.95"/>
    </filter>
    <filter id="redGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feFlood flood-color="#E5001A" flood-opacity="0.50" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ringGlow" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- OUTER FRAME -->
  <polygon points="155,18 345,18 482,155 482,345 345,482 155,482 18,345 18,155"
           fill="none" stroke="url(#goldOuter)" stroke-width="16" stroke-linejoin="bevel"/>
  <polygon points="159,22 341,22 478,159 478,341 341,478 159,478 22,341 22,159"
           fill="#101010" stroke="none"/>
  <polygon points="165,28 335,28 472,165 472,335 335,472 165,472 28,335 28,165"
           fill="none" stroke="url(#goldInner)" stroke-width="6" stroke-linejoin="bevel"
           filter="url(#ringGlow)"/>
  <polygon points="170,33 330,33 467,170 467,330 330,467 170,467 33,330 33,170"
           fill="none" stroke="rgba(229,0,26,0.55)" stroke-width="1.5"/>

  <!-- CLIPPED INTERIOR -->
  <g clip-path="url(#oct)">
    <rect width="500" height="500" fill="#050505"/>
    <rect width="500" height="500" fill="url(#bgG)"/>
    <ellipse cx="250" cy="220" rx="200" ry="175" fill="url(#glowG)"/>
    <g stroke="rgba(255,255,255,0.025)" stroke-width="1" fill="none">
      <line x1="0"   y1="125" x2="500" y2="125"/>
      <line x1="0"   y1="250" x2="500" y2="250"/>
      <line x1="0"   y1="375" x2="500" y2="375"/>
      <line x1="125" y1="0"   x2="125" y2="500"/>
      <line x1="250" y1="0"   x2="250" y2="500"/>
      <line x1="375" y1="0"   x2="375" y2="500"/>
    </g>
    <polygon points="155,18 225,18 155,88"  fill="rgba(229,0,26,0.16)"/>
    <polygon points="345,18 275,18 345,88"  fill="rgba(229,0,26,0.16)"/>
    <polygon points="155,482 225,482 155,412" fill="rgba(229,0,26,0.12)"/>
    <polygon points="345,482 275,482 345,412" fill="rgba(229,0,26,0.12)"/>

    <!-- LEFT FIGHTER SILHOUETTE -->
    <g fill="#8B0010" opacity="0.55" transform="translate(72,130)">
      <ellipse cx="0" cy="0" rx="20" ry="22"/>
      <ellipse cx="0" cy="65" rx="18" ry="34"/>
      <rect x="-30" y="10" width="13" height="38" rx="6" transform="rotate(-30,-24,29)"/>
      <rect x="-42" y="-18" width="13" height="28" rx="6" transform="rotate(-48,-36,-4)"/>
      <rect x="10"  y="20" width="12" height="32" rx="6" transform="rotate(18,16,36)"/>
      <rect x="-14" y="99" width="13" height="46" rx="6" transform="rotate(-8,-8,122)"/>
      <rect x="4"   y="98" width="13" height="30" rx="6" transform="rotate(22,10,113)"/>
      <rect x="20"  y="120" width="13" height="24" rx="6" transform="rotate(40,26,132)"/>
    </g>

    <!-- RIGHT FIGHTER SILHOUETTE (mirrored) -->
    <g fill="#8B0010" opacity="0.55" transform="translate(428,130) scale(-1,1)">
      <ellipse cx="0" cy="0" rx="20" ry="22"/>
      <ellipse cx="0" cy="65" rx="18" ry="34"/>
      <rect x="-30" y="10" width="13" height="38" rx="6" transform="rotate(-30,-24,29)"/>
      <rect x="-42" y="-18" width="13" height="28" rx="6" transform="rotate(-48,-36,-4)"/>
      <rect x="10"  y="20" width="12" height="32" rx="6" transform="rotate(18,16,36)"/>
      <rect x="-14" y="99" width="13" height="46" rx="6" transform="rotate(-8,-8,122)"/>
      <rect x="4"   y="98" width="13" height="30" rx="6" transform="rotate(22,10,113)"/>
      <rect x="20"  y="120" width="13" height="24" rx="6" transform="rotate(40,26,132)"/>
    </g>

    <!-- SEPARATOR -->
    <line x1="85" y1="232" x2="415" y2="232" stroke="rgba(229,0,26,0.45)" stroke-width="1"/>
    <line x1="105" y1="236" x2="395" y2="236" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- MARCA -->
    <rect x="110" y="240" width="280" height="38" rx="3" fill="rgba(229,0,26,0.08)"/>
    <text x="250" y="267" text-anchor="middle"
          font-family="Oswald, 'Arial Narrow', Impact, sans-serif"
          font-size="28" font-weight="400" fill="url(#chromeG)"
          letter-spacing="18" filter="url(#ds)">MARCA</text>

    <!-- ACME -->
    <text x="250" y="358" text-anchor="middle"
          font-family="Oswald, 'Arial Narrow', Impact, sans-serif"
          font-size="128" font-weight="700" fill="rgba(229,0,26,0.40)"
          letter-spacing="2" filter="url(#redGlow)">ACME</text>
    <text x="254" y="362" text-anchor="middle"
          font-family="Oswald, 'Arial Narrow', Impact, sans-serif"
          font-size="128" font-weight="700" fill="rgba(0,0,0,0.75)"
          letter-spacing="2">ACME</text>
    <text x="250" y="358" text-anchor="middle"
          font-family="Oswald, 'Arial Narrow', Impact, sans-serif"
          font-size="128" font-weight="700" fill="url(#redM)"
          stroke="rgba(255,255,255,0.14)" stroke-width="1" paint-order="stroke"
          letter-spacing="2">ACME</text>

    <!-- FIGHT & FITNESS BAR -->
    <rect x="96" y="368" width="308" height="50" rx="5" fill="rgba(5,5,5,0.88)"/>
    <rect x="96" y="368" width="308" height="50" rx="5"
          fill="none" stroke="url(#goldOuter)" stroke-width="1.2"/>
    <rect x="98" y="370" width="304" height="2" rx="1" fill="rgba(255,255,255,0.07)"/>
    <text x="250" y="402" text-anchor="middle"
          font-family="Oswald, 'Arial Narrow', Impact, sans-serif"
          font-size="23" font-weight="600" fill="url(#goldTG)"
          letter-spacing="7" filter="url(#ds)">FIGHT &amp; FITNESS</text>

    <!-- Inner scan ring -->
    <polygon points="155,18 345,18 482,155 482,345 345,482 155,482 18,345 18,155"
             fill="none" stroke="rgba(229,0,26,0.05)" stroke-width="30"/>
  </g>

  <!-- Re-draw gold ring on top -->
  <polygon points="155,18 345,18 482,155 482,345 345,482 155,482 18,345 18,155"
           fill="none" stroke="url(#goldOuter)" stroke-width="7" stroke-linejoin="bevel"/>
  <polygon points="155,18 345,18 482,155 482,345 345,482 155,482 18,345 18,155"
           fill="none" stroke="rgba(229,0,26,0.35)" stroke-width="1.8"/>

</svg>
